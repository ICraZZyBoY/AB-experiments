components_manager:
  task_processors:
    main-task-processor:
      worker_threads: 4
    fs-task-processor:
      worker_threads: 2
    monitor-task-processor:
      worker_threads: 1
      thread_name: mon

  default_task_processor: main-task-processor

  components:
    testsuite-support:

    dns-client:
      fs-task-processor: fs-task-processor
      hosts-file-path: /etc/hosts
      hosts-file-update-interval: 10m
      network-timeout: 1s
      network-attempts: 1

    server:
      listener:
        port: 8080
        task_processor: main-task-processor
      listener-monitor:
        port: 8081
        task_processor: monitor-task-processor

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stdout'
          level: info
          overflow_behavior: discard

    postgres-db:
      dbconnection#env: POSTGRES_DSN
      blocking_task_processor: fs-task-processor
      dns_resolver: async

    config-build-scheduler:
      build-interval-ms: 5000

    metric-calculation-scheduler:
      calculation-interval-ms: 5000

    handler-health:
      path: /health
      method: GET
      task_processor: main-task-processor

    handler-register-service:
      path: /api/v1/auth/register-service
      method: POST
      task_processor: main-task-processor

    handler-login:
      path: /api/v1/auth/login
      method: POST
      task_processor: main-task-processor

    handler-client-services:
      path: /api/v1/client-services
      method: GET
      task_processor: main-task-processor

    handler-config-versions:
      path: /api/v1/config-versions
      method: GET,POST
      task_processor: main-task-processor

    handler-experiments:
      path: /api/v1/experiments
      method: GET,POST,PATCH
      task_processor: main-task-processor

    handler-experiment-metrics:
      path: /api/v1/experiment-metrics
      method: GET,POST
      task_processor: main-task-processor

    handler-features:
      path: /api/v1/features
      method: GET,POST
      task_processor: main-task-processor

    handler-flags:
      path: /api/v1/flags
      method: GET,POST
      task_processor: main-task-processor

    handler-platform-users:
      path: /api/v1/platform-users
      method: GET,POST
      task_processor: main-task-processor

    handler-api-keys:
      path: /api/v1/api-keys
      method: GET,POST,DELETE
      task_processor: main-task-processor

    handler-metric-results:
      path: /api/v1/metric-results
      method: GET,POST
      task_processor: main-task-processor

    handler-metrics:
      path: /api/v1/metrics
      method: GET,POST
      task_processor: main-task-processor

    handler-runtime-flags:
      path: /api/v1/runtime/flags
      method: POST
      task_processor: main-task-processor

    handler-runtime-events:
      path: /api/v1/runtime/events
      method: POST
      task_processor: main-task-processor

    handler-server-monitor:
      path: /service/monitor
      method: GET
      task_processor: monitor-task-processor
