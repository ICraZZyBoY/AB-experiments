services:
  postgres:
    image: postgres:16-alpine
    container_name: ab-experiments-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ab_experiments}
      POSTGRES_USER: ${POSTGRES_USER:-ab_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./create_db.sql:/docker-entrypoint-initdb.d/01-create_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ab_admin} -d ${POSTGRES_DB:-ab_experiments}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ab-experiments-backend
    environment:
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-ab_admin}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-ab_experiments}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-ab_experiments}
      DB_USER: ${POSTGRES_USER:-ab_admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8081:8081"

  frontend:
    build:
      context: ./frontend
    container_name: ab-experiments-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  demo-client:
    build:
      context: ./demo-client
    container_name: ab-experiments-demo-client
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  postgres_data:
